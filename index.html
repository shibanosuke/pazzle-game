<style>
@import url('https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap');
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#app{
  --sky-top:#5ec6f0;--sky-bottom:#8fe28a;
  --panel:#fff3c4;--panel-border:#ffb100;
  --accent:#1fa4e8;--accent2:#ff4d6d;--warn:#ff8f1f;--ok:#3bb54a;
  --text:#4a3200;--muted:#9c7d2e;
  --f-display:'Mochiy Pop One','M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Trebuchet MS',var(--font-sans),sans-serif;
  --f-pixel:'Mochiy Pop One','M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Courier New',monospace;
  font-family:var(--f-display);color:var(--text);
  position:fixed;inset:0;width:100%;height:100vh;height:100dvh;
  background:
    radial-gradient(circle at 15% 12%,rgba(255,255,255,.6) 0%,rgba(255,255,255,0) 10%),
    radial-gradient(circle at 82% 18%,rgba(255,255,255,.45) 0%,rgba(255,255,255,0) 8%),
    radial-gradient(circle at 92% 65%,rgba(255,255,255,.3) 0%,rgba(255,255,255,0) 12%),
    radial-gradient(circle at 6% 78%,rgba(255,255,255,.28) 0%,rgba(255,255,255,0) 11%),
    radial-gradient(ellipse at 50% -10%,rgba(255,246,208,.5) 0%,rgba(255,246,208,0) 40%),
    linear-gradient(180deg,var(--sky-top) 0%,var(--sky-top) 38%,var(--sky-bottom) 100%);
  display:flex;align-items:center;justify-content:center;
  padding:clamp(4px,2vw,20px);overflow:auto;touch-action:none;
}
#game-shell{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;gap:8px;max-width:900px;width:100%;max-height:100%;
  background:linear-gradient(180deg,#ffe98a,#ffc93c);
  border:4px solid #fff6d0;outline:3px solid #e08e00;outline-offset:-3px;
  border-radius:26px;padding:16px 14px 12px;
  box-shadow:0 14px 0 rgba(170,100,0,.35),0 18px 30px rgba(0,0,0,.35),0 0 46px rgba(255,201,60,.55);
}
#game-row{display:flex;gap:clamp(8px,2vw,24px);justify-content:center;align-items:flex-start;width:100%;flex-wrap:wrap}
.side{width:clamp(100px,18vw,150px);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
canvas{display:block;border:0.5px solid rgba(255,255,255,.08);border-radius:4px;background:#0a0a0f}
.panel{position:relative;overflow:hidden;background:var(--panel);border:2.5px solid var(--panel-border);border-radius:14px;padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 3px 0 rgba(190,110,0,.35),0 4px 10px rgba(0,0,0,.2),0 0 18px rgba(255,177,0,.28)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.panel::after{content:'';position:absolute;top:-40%;left:-60%;width:70%;height:220%;background:linear-gradient(75deg,transparent 35%,rgba(255,255,255,.5) 48%,transparent 60%);pointer-events:none}
.panel-title{font-family:var(--f-display);font-size:13px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-weight:400}
.big-num{font-family:var(--f-pixel);font-size:17px;line-height:1.5;font-weight:400;color:var(--text);text-shadow:0 1px 0 rgba(255,255,255,.5);transition:transform .15s ease}
.big-num.pop{transform:scale(1.22)}
#score{color:#0e6fa8;text-shadow:0 1px 0 rgba(255,255,255,.6),0 0 10px rgba(31,164,232,.45)}
#lines{color:#1f7a2e;text-shadow:0 1px 0 rgba(255,255,255,.6),0 0 10px rgba(59,181,74,.45)}
.small-label{font-family:var(--f-display);font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.02em;font-weight:400}
.gauge{position:relative;height:7px;background:rgba(0,0,0,.12);border-radius:4px;overflow:hidden;margin-top:8px}
.gauge-fill{position:relative;height:100%;border-radius:4px;width:0%;transition:width .25s ease;box-shadow:0 0 8px rgba(255,255,255,.5)}
.gauge-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);width:40%;animation:gauge-shine 2.2s linear infinite}
@keyframes gauge-shine{0%{transform:translateX(-120%)}100%{transform:translateX(350%)}}
#score-bar{background:linear-gradient(90deg,var(--accent),#7fd8ff)}
#lines-bar{background:linear-gradient(90deg,var(--ok),#8ef29b)}
#next-canvas{display:block;margin:0 auto}
#hold-canvas{display:block;margin:0 auto}
.danger-badge{background:rgba(255,61,110,.15);color:var(--accent2);font-size:11px;padding:3px 8px;border-radius:6px;display:none}
#effect-label{font-family:var(--f-display);font-size:11px;color:#b6510a;min-height:14px;margin-top:4px;font-weight:400;letter-spacing:.02em}
button.start-btn{width:100%;padding:11px;border-radius:12px;border:3px solid #fff3c4;background:linear-gradient(180deg,#ff7a3d,#ff4d1f);color:#fff;font-family:var(--f-display);font-size:15px;font-weight:400;letter-spacing:.04em;cursor:pointer;box-shadow:0 4px 0 #c73d10,0 6px 14px rgba(0,0,0,.3),0 0 0 rgba(255,140,60,0);text-shadow:0 1px 2px rgba(0,0,0,.25);animation:btn-glow 1.8s ease-in-out infinite}
@keyframes btn-glow{0%,100%{box-shadow:0 4px 0 #c73d10,0 6px 14px rgba(0,0,0,.3),0 0 10px rgba(255,140,60,.35)}50%{box-shadow:0 4px 0 #c73d10,0 6px 14px rgba(0,0,0,.3),0 0 26px rgba(255,140,60,.8)}}
button.start-btn:hover{filter:brightness(1.06)}
button.start-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c73d10,0 3px 8px rgba(0,0,0,.3)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,rgba(70,110,150,.55),rgba(10,20,35,.88));border-radius:4px;color:#fff;gap:14px}
#overlay h2{font-family:var(--f-pixel);font-size:18px;font-weight:400;letter-spacing:.04em;line-height:1.6;color:#fff6d0;text-shadow:0 0 10px #fff,0 0 20px #ffb100,0 0 40px #ff8f1f,0 0 60px #ff4d1f;animation:title-flicker 2.6s infinite}
@keyframes title-flicker{0%,90%,100%{opacity:1}92%{opacity:.65}94%{opacity:1}97%{opacity:.7}}
#overlay p{font-family:var(--f-display);font-size:12px;opacity:.85;text-align:center;max-width:190px;line-height:1.7;letter-spacing:.01em}
#wrap{position:relative;width:clamp(160px,44vw,240px);max-width:100%}
canvas#board{width:100%;height:auto;aspect-ratio:1/2;border:2px solid #fff;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 0 22px rgba(31,164,232,.3),0 0 46px rgba(255,201,60,.2);transition:box-shadow .35s ease}
#wrap.chaos-glow canvas#board{box-shadow:0 0 0 1px rgba(255,61,110,.4),0 0 26px rgba(255,61,110,.6),0 0 60px rgba(255,61,110,.3)}
#wrap.explosion-punch{animation:explosion-punch .35s cubic-bezier(.2,1.8,.3,1)}
@keyframes explosion-punch{0%{transform:scale(1)}25%{transform:scale(1.07)}100%{transform:scale(1)}}
#flash-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:4px}
#levelup-banner{font-family:var(--f-pixel);position:absolute;top:12px;left:50%;transform:translateX(-50%) scale(.75);color:#fff;font-size:10px;letter-spacing:.03em;text-shadow:0 0 14px var(--accent),0 0 28px var(--accent);opacity:0;pointer-events:none;transition:all .25s ease;white-space:nowrap}
#levelup-banner.show{opacity:1;transform:translateX(-50%) scale(1)}
#clear-banner{font-family:var(--f-pixel);position:absolute;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);opacity:0;color:#fff;font-size:15px;letter-spacing:.02em;text-shadow:0 0 18px var(--accent2),0 0 42px var(--accent2);pointer-events:none;white-space:nowrap}
#clear-banner.burst{animation:clear-burst .7s cubic-bezier(.19,1.6,.4,1) forwards}
@keyframes clear-burst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(2.7)}
  22%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  45%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.85)}
}
#keys{font-family:var(--f-display);font-size:11px;color:#7a5a10;line-height:1.6;letter-spacing:.01em;text-align:center;max-width:520px;font-weight:400}
#version-footer{font-family:var(--f-display);font-size:10px;color:#fff;background:#000000;opacity:.85;letter-spacing:.04em;text-align:center;padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:2px;box-shadow:0 0 10px rgba(255,255,255,.35),0 2px 6px rgba(0,0,0,.4)}
#chaos-warn{font-family:var(--f-display);background:linear-gradient(180deg,rgba(255,255,255,.75),rgba(255,238,190,.6));border:2px solid #ff8f1f;color:#b6510a;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:400;letter-spacing:.03em;display:none;box-shadow:0 0 14px rgba(255,143,31,.5);animation:chaos-pulse 0.6s ease-in-out infinite}
@keyframes chaos-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.03)}}
#combo{display:inline-block}
#combo.combo-hot{color:var(--accent2);text-shadow:0 0 14px currentColor}
#combo.burst{animation:combo-burst .45s cubic-bezier(.2,1.5,.4,1)}
@keyframes combo-burst{0%{transform:scale(2.1);text-shadow:0 0 26px currentColor}60%{transform:scale(1.05)}100%{transform:scale(1)}}

@media (max-width:680px),(max-aspect-ratio:4/5){
  #game-row{flex-direction:column;align-items:center;gap:6px}
  #wrap{order:-1;width:min(74vw,280px);margin-bottom:2px}
  .side{width:100%;max-width:340px;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px}
  .side .panel{flex:1 1 84px;min-width:78px;padding:7px 8px}
  .side .panel-title{font-size:9px;margin-bottom:4px}
  .side .big-num{font-size:12px}
  .side .small-label{font-size:9px;margin-top:3px}
  #keys{display:none}
}
@media (max-height:700px) and (max-width:680px){
  #game-shell{gap:6px}
  .side .panel{padding:5px 7px}
}

<div id="app">
  <div id="game-shell">
    <div id="version-footer">Latest Update: 2026.07.11 (v5.0)<span id="font-status"></span></div>
    <div id="game-row">
      <div id="side-left" class="side">

<script>
const COLS=11,ROWS=22,SZ=20;
const SHAPES=[
  [[1,1,1,1]],                      // I
  [[1,1],[1,1]],                    // O
  [[0,1,0],[1,1,1]],                // T
  [[1,0,0],[1,1,1]],                // J
  [[0,0,1],[1,1,1]],                // L
  [[0,1,1],[1,1,0]],                // S
  [[1,1,0],[0,1,1]],                // Z
  [[1,1,1],[1,0,1],[1,0,1]],        // U (special)
  [[1],[1]],                        // V2: simple vertical 2-cell mino
];
// each mino type always renders in its own fixed color
const COLORS=['#4ec9ff','#ffcc00','#b388ff','#3d5afe','#ff6b35','#00e676','#ff4444','#69ffda','#ff3ea5'];
const CHAOS_EFFECTS=['反転','暗転','地震','倍速','ガーベジ','虹色','テレポート','乱回転','巨大化','爆発','ワンパターン'];
let board,piece,nextQueue,hold,holdUsed,score,lines,level,combo,chaosGauge,chaosActive,chaosTimer,chaosEffect,gameRunning,gameOver,animId,dropTimer,dropInterval,darkMode,invertMode,quakeX,quakeTimer;
let chaosCount,garbageMode,rainbowMode,teleportMode,randRotateMode,giantMode,darkFlicker,chaosIntervals,hueBase;
let chaosElapsed=0,lastFrameTs=null;
let monoMode=false,monoShapeIndex=0;
let particles=[],popups=[],shakeTimer=0,shakeAmp=0,clearingRows=[],locking=false;

// ---- Sound (WebAudio, generated beeps - no external files) ----
let audioCtx=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function beep(freq,dur=0.08,type='square',vol=0.05,slideTo=null,delay=0){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+dur+0.02);
}
function noiseBurst(dur=0.35,vol=0.2,delay=0){
  if(!audioCtx)return;
  const size=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
  const buffer=audioCtx.createBuffer(1,size,audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<size;i++)data[i]=(Math.random()*2-1)*(1-i/size);
  const src=audioCtx.createBufferSource();
  src.buffer=buffer;
  const g=audioCtx.createGain();
  const t=audioCtx.currentTime+delay;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(g);g.connect(audioCtx.destination);
  src.start(t);
}
// soft, round "poko / pako / peko" toy-pop sound: quick attack, gentle pitch bend, soft decay
function poko(freq,dur=0.12,vol=0.14,bend=0.85,type='sine',delay=0){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;
  o.frequency.setValueAtTime(freq,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*bend),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+dur+0.03);
}
const SFX={
  move:()=>poko(680,0.05,0.07,0.92,'sine'),
  rotate:()=>poko(640,0.07,0.09,1.18,'triangle'),
  softdrop:()=>poko(480,0.05,0.06,0.88,'sine'),
  harddrop:()=>{poko(260,0.16,0.17,0.55,'sine');poko(150,0.14,0.11,0.7,'sine',0.02);},
  lock:()=>poko(380,0.08,0.09,0.8,'triangle'),
  hold:()=>poko(760,0.09,0.11,1.05,'sine'),
  clear1:()=>{poko(523,0.09,0.12,0.97,'sine');poko(659,0.1,0.12,1.02,'sine',0.08);},
  clear2:()=>{poko(523,0.08,0.11,0.97,'sine');poko(659,0.08,0.11,1,'sine',0.06);poko(784,0.12,0.13,1.02,'triangle',0.12);},
  clear3:()=>{[523,659,784,1047].forEach((f,i)=>poko(f,0.09,0.13,i%2?1.03:0.98,'sine',i*0.05));},
  quad:()=>{[523,659,784,1047].forEach((f,i)=>poko(f,0.11,0.13,i%2?1.05:0.97,i%2?'triangle':'sine',i*0.08));},
  levelup:()=>{[500,600,720,900].forEach((f,i,a)=>poko(f,i===a.length-1?0.22:0.1,0.12,i===a.length-1?1.3:1,'sine',i*0.09));},
  chaos:()=>{poko(700,0.11,0.13,0.75,'sine');poko(500,0.11,0.13,0.75,'sine',0.13);poko(700,0.11,0.13,0.75,'sine',0.26);},
  gameover:()=>{[480,380,300,230].forEach((f,i)=>poko(f,0.2,0.1,0.8,'sine',i*0.15));},
  garbageAdd:()=>poko(210,0.18,0.13,0.6,'sine'),
  explosion:()=>{
    noiseBurst(0.3,0.16);
    poko(160,0.3,0.2,0.5,'sine');
    poko(100,0.4,0.16,0.55,'sine',0.03);
    poko(90,0.3,0.12,0.6,'triangle',0.09);
  },
  mono:()=>{poko(480,0.06,0.09,1,'sine');poko(480,0.06,0.09,1,'sine',0.09);poko(480,0.09,0.1,1,'sine',0.18);},
};

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const nctx=document.getElementById('next-canvas').getContext('2d');
const hctx=document.getElementById('hold-canvas').getContext('2d');

function newBoard(){return Array.from({length:ROWS},()=>new Array(COLS).fill(0))}
function randPiece(){
  const si=monoMode?monoShapeIndex:Math.floor(Math.random()*SHAPES.length);
  const s=SHAPES[si];
  return{shape:s.map(r=>[...r]),color:COLORS[si],x:Math.floor((COLS-s[0].length)/2),y:0};
}
function fillQueue(){while(nextQueue.length<5)nextQueue.push(randPiece())}
function getNextPiece(){
  let p=nextQueue.shift();fillQueue();
  return p;
}

function calcDropInterval(lvl){
  // exponential ramp: gets noticeably faster level over level, floor at 60ms
  return Math.max(60,Math.round(800*Math.pow(0.87,lvl-1)));
}

function calcChaosIntervalMs(lvl){
  // chaos now fires on a fixed clock instead of via line clears; comes a little
  // more often as the level rises, floor at 12s so it never gets absurd
  return Math.max(12000,25000-(lvl-1)*800);
}

function clearChaosIntervals(){
  (chaosIntervals||[]).forEach(id=>clearInterval(id));
  chaosIntervals=[];
}

function startGame(){
  board=newBoard();nextQueue=[];hold=null;holdUsed=false;
  score=0;lines=0;level=1;combo=0;chaosGauge=0;chaosActive=false;chaosEffect='';chaosCount=0;chaosElapsed=0;lastFrameTs=null;
  gameRunning=true;gameOver=false;darkMode=false;invertMode=false;quakeX=0;quakeTimer=0;
  garbageMode=false;rainbowMode=false;teleportMode=false;randRotateMode=false;giantMode=false;darkFlicker=false;hueBase=0;monoMode=false;
  particles=[];popups=[];shakeTimer=0;shakeAmp=0;clearingRows=[];locking=false;
  ensureAudio();
  clearChaosIntervals();
  dropInterval=calcDropInterval(level);
  fillQueue();piece=getNextPiece();
  document.getElementById('overlay').style.display='none';
  document.getElementById('chaos-warn').style.display='none';
  document.getElementById('wrap').classList.remove('chaos-glow');
  if(animId)cancelAnimationFrame(animId);
  clearTimeout(dropTimer);
  schedDrop();
  animId=requestAnimationFrame(loop);
}

function schedDrop(){
  clearTimeout(dropTimer);
  dropTimer=setTimeout(()=>{if(gameRunning)softDrop(true);},dropInterval);
}

function softDrop(auto=false){
  if(!gameRunning||locking)return;
  if(!move(0,1)){lock();return;}
  if(!auto)score+=1;
  schedDrop();
}

function hardDrop(){
  if(!gameRunning||locking)return;
  let d=0;while(move(0,1))d++;
  score+=d*2;
  SFX.harddrop();
  lock();
}

function move(dx,dy){
  piece.x+=dx;piece.y+=dy;
  if(collides()){piece.x-=dx;piece.y-=dy;return false;}
  return true;
}

function rotate(dir=1){
  const orig=piece.shape.map(r=>[...r]);
  const R=piece.shape.length,C=piece.shape[0].length;
  let rotated=Array.from({length:C},(_,i)=>Array.from({length:R},(_,j)=>dir===1?piece.shape[R-1-j][i]:piece.shape[j][C-1-i]));
  piece.shape=rotated;
  // wall kick
  for(let kick of[0,-1,1,-2,2]){piece.x+=kick;if(!collides())return;piece.x-=kick;}
  piece.shape=orig;
}

function collides(p=piece,b=board){
  for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[0].length;c++){
    if(!p.shape[r][c])continue;
    const nx=p.x+c,ny=p.y+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return true;
    if(ny>=0&&b[ny][nx])return true;
  }
  return false;
}

function lock(){
  if(locking)return;
  SFX.lock();
  for(let r=0;r<piece.shape.length;r++)for(let c=0;c<piece.shape[0].length;c++){
    if(piece.shape[r][c]){
      const ny=piece.y+r;
      if(ny<0){endGame();return;}
      board[ny][piece.x+c]=piece.color;
    }
  }
  // find full rows
  const full=[];
  for(let r=0;r<ROWS;r++)if(board[r].every(c=>c))full.push(r);
  if(full.length){
    // flash animation: freeze briefly, show rows in white, then remove
    locking=true;
    clearingRows=full;
    clearTimeout(dropTimer);
    spawnClearParticles(full);
    setTimeout(()=>{
      if(!gameRunning){clearingRows=[];locking=false;return;}
      // rebuild the board rather than splicing rows one-by-one: splicing+unshifting
      // multiple rows by their original indices shifts the remaining target indices
      // out from under you, which either leaves full rows uncleared or wipes out an
      // unrelated row above them (the "auto-leveling" bug).
      const fullSet=new Set(full);
      const kept=board.filter((row,idx)=>!fullSet.has(idx));
      const freshRows=Array.from({length:full.length},()=>new Array(COLS).fill(0));
      board=freshRows.concat(kept);
      clearingRows=[];
      locking=false;
      applyClearScore(full.length);
      nextPieceIn();
    },200);
  } else {
    combo=0;update();
    nextPieceIn();
  }
}

function nextPieceIn(){
  holdUsed=false;
  piece=getNextPiece();
  if(collides()){endGame();return;}
  schedDrop();
}

function applyClearScore(cleared){
  combo++;
  const prevLevel=level;
  const pts=Math.round([0,100,300,500,800][Math.min(cleared,4)]*level*(1+combo*0.1));
  score+=pts;
  lines+=cleared;
  level=Math.floor(lines/10)+1;
  if(!chaosActive)dropInterval=calcDropInterval(level);
  if(level>prevLevel){showLevelUp();SFX.levelup();}
  if(cleared>=4)SFX.quad();else if(cleared===3)SFX.clear3();else if(cleared===2)SFX.clear2();else SFX.clear1();
  spawnPopup('+'+pts.toLocaleString());
  shake(cleared>=4?6:cleared>=2?4:2,cleared>=4?18:10);
  flashScore();
  flashBoard();
  burstCombo();
  showClearBanner(cleared);
  update();
}

function spawnClearParticles(rows){
  rows.forEach(r=>{
    for(let c=0;c<COLS;c++){
      const color=board[r][c]||'#ffffff';
      for(let k=0;k<2;k++){
        particles.push({
          x:c*SZ+SZ/2,y:r*SZ+SZ/2,
          vx:(Math.random()-0.5)*4.5,vy:-Math.random()*3.5-1,
          size:Math.random()*4+2,color,life:1,decay:0.025+Math.random()*0.02
        });
      }
    }
  });
  if(particles.length>400)particles.splice(0,particles.length-400);
}

function spawnPopup(text){
  popups.push({text,x:COLS*SZ/2,y:ROWS*SZ*0.35,life:1});
}

function shake(amp,frames){shakeAmp=amp;shakeTimer=frames;}

function showLevelUp(){
  const b=document.getElementById('levelup-banner');
  b.textContent='LEVEL '+level+' !';
  b.classList.add('show');
  clearTimeout(b._t);
  b._t=setTimeout(()=>b.classList.remove('show'),1100);
}

function flashScore(){
  const s=document.getElementById('score');
  s.classList.add('pop');
  clearTimeout(s._t);
  s._t=setTimeout(()=>s.classList.remove('pop'),180);
}

function applyChaosEffect(eff){
  if(eff==='暗転'){
    darkMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!darkMode)return;
      darkFlicker=true;
      setTimeout(()=>{darkFlicker=false;},220);
    },1500);
    chaosIntervals.push(id);
  }
  else if(eff==='反転')invertMode=true;
  else if(eff==='巨大化')giantMode=true;
  else if(eff==='地震')quakeTimer=999999; // cleared on chaos end
  else if(eff==='倍速')dropInterval=Math.max(40,dropInterval/2);
  else if(eff==='虹色')rainbowMode=true;
  else if(eff==='テレポート'){
    teleportMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!teleportMode||locking)return;
      const maxX=COLS-piece.shape[0].length;
      const nx=Math.max(0,Math.floor(Math.random()*(maxX+1)));
      const orig=piece.x;piece.x=nx;
      if(collides())piece.x=orig;
    },1400);
    chaosIntervals.push(id);
  }
  else if(eff==='乱回転'){
    randRotateMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!randRotateMode||locking)return;
      rotate(Math.random()<0.5?1:-1);
    },1600);
    chaosIntervals.push(id);
  }
  else if(eff==='ガーベジ'){
    garbageMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!garbageMode||locking)return;
      board.shift();
      const hole=Math.floor(Math.random()*COLS);
      const row=new Array(COLS).fill('#555');row[hole]=0;
      board.push(row);
      // audible/visible warning that the stack just rose by one row
      SFX.garbageAdd();
      shake(3,10);
      spawnPopup('GARBAGE!');
      if(collides())endGame();
    },2200);
    chaosIntervals.push(id);
  }
  else if(eff==='爆発'){
    explodeStack();
  }
  else if(eff==='ワンパターン'){
    monoMode=true;
    // the 7-cell U special piece (index 7) doesn't tile well on its own —
    // repeating only that shape can unfairly top the board out, so it's excluded here
    const monoCandidates=SHAPES.map((_,i)=>i).filter(i=>i!==7);
    monoShapeIndex=monoCandidates[Math.floor(Math.random()*monoCandidates.length)];
    // immediately overwrite the upcoming queue so the streak starts right away,
    // not just whenever the existing queue happens to cycle out
    nextQueue=nextQueue.map(()=>randPiece());
    SFX.mono();
    spawnPopup('ワンパターン!');
  }
}

function explodeStack(){
  // find the topmost row that has any locked block in it
  let top=ROWS;
  for(let r=0;r<ROWS;r++){if(board[r].some(c=>c)){top=r;break;}}
  const hitCells=[];
  if(top<ROWS){
    // a mostly-round blast crater: pick a center a little way into the stack,
    // then destroy everything within a radius. Only a touch of noise right at
    // the edge, so it reads as a circle rather than a jagged/concave/holey mess.
    const radius=2.3+Math.random()*0.9; // ~2.3-3.2 cell radius
    const reach=Math.ceil(radius)+1;
    const cy=Math.min(ROWS-1,top+Math.floor(radius*0.55));
    const cx=Math.max(reach,Math.min(COLS-1-reach,Math.floor(Math.random()*COLS)));
    const rMin=Math.max(top,cy-reach), rMax=Math.min(ROWS-1,cy+reach);
    const cMin=Math.max(0,cx-reach), cMax=Math.min(COLS-1,cx+reach);
    for(let r=rMin;r<=rMax;r++){
      for(let c=cMin;c<=cMax;c++){
        const dx=c-cx,dy=r-cy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const edgeNoise=(Math.random()-0.5)*0.5; // only softens the outer rim
        if(dist<=radius+edgeNoise){
          if(board[r][c]){hitCells.push({r,c,color:board[r][c]});board[r][c]=0;}
        }
      }
    }
  }
  // fiery debris: lots of small fast sparks per destroyed cell
  hitCells.forEach(({r,c,color})=>{
    for(let k=0;k<10;k++){
      particles.push({
        x:c*SZ+SZ/2,y:r*SZ+SZ/2,
        vx:(Math.random()-0.5)*16,vy:-Math.random()*12-4,
        size:Math.random()*5+3,color,life:1,decay:0.014+Math.random()*0.018
      });
    }
    // a couple of bigger, slower flying chunks for weight/drama
    for(let k=0;k<2;k++){
      particles.push({
        x:c*SZ+SZ/2,y:r*SZ+SZ/2,
        vx:(Math.random()-0.5)*9,vy:-Math.random()*9-2,
        size:Math.random()*8+8,color,life:1,decay:0.01+Math.random()*0.01
      });
    }
  });
  // a burst of pure fire-colored sparks across the whole blast width, even over empty cells,
  // so the explosion reads as huge even when the stack itself was thin
  if(hitCells.length){
    const rowsUsed=new Set(hitCells.map(h=>h.r));
    const minR=Math.min(...rowsUsed),maxR=Math.max(...rowsUsed);
    const minC=Math.min(...hitCells.map(h=>h.c)),maxC=Math.max(...hitCells.map(h=>h.c));
    const cx=(minC+maxC)/2*SZ+SZ/2, cy=(minR+maxR)/2*SZ+SZ/2;
    const fireColors=['#fff3b0','#ffcc33','#ff8a1e','#ff3d00'];
    for(let k=0;k<40;k++){
      const ang=Math.random()*Math.PI*2,spd=Math.random()*14+4;
      particles.push({
        x:cx,y:cy,
        vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-4,
        size:Math.random()*6+2,color:fireColors[Math.floor(Math.random()*fireColors.length)],
        life:1,decay:0.02+Math.random()*0.025
      });
    }
  }
  SFX.explosion();
  shake(16,34);
  flashBoard('radial-gradient(circle at 50% 30%,#fff6d8,#ff9a1e 45%,#ff2d00 75%)',0.85);
  setTimeout(()=>flashBoard('#ff3d00',0.35),90);
  const wrapEl=document.getElementById('wrap');
  wrapEl.classList.remove('explosion-punch');
  void wrapEl.offsetWidth;
  wrapEl.classList.add('explosion-punch');
  showBigBanner('BOOM!!','#ff5a1e');
  spawnPopup('BOOM!!');
  if(particles.length>500)particles.splice(0,particles.length-500);
}

function pickChaosEffect(exclude){
  const pool=CHAOS_EFFECTS.filter(e=>e!==exclude);
  return pool[Math.floor(Math.random()*pool.length)];
}

function triggerChaos(){
  chaosActive=true;chaosGauge=0;chaosElapsed=0;chaosCount++;
  clearChaosIntervals();
  darkMode=invertMode=giantMode=darkFlicker=false;
  garbageMode=rainbowMode=teleportMode=randRotateMode=monoMode=false;
  quakeTimer=0;
  document.getElementById('wrap').classList.add('chaos-glow');
  SFX.chaos();

  // always two distinct effects at once, with 爆発 weighted to appear far more often
  const first=pickChaosEffect(null);
  const second=pickChaosEffect(first);
  const effects=[first,second];

  chaosEffect=effects.join(' + ');
  document.getElementById('chaos-warn').style.display='block';
  document.getElementById('effect-label').textContent='▸ '+chaosEffect;
  effects.forEach(applyChaosEffect);

  // chaos episodes get a little longer as they escalate
  const duration=6000+Math.min(3000,chaosCount*250);
  chaosTimer=setTimeout(()=>{
    chaosActive=false;darkMode=false;invertMode=false;giantMode=false;darkFlicker=false;
    garbageMode=false;rainbowMode=false;teleportMode=false;randRotateMode=false;monoMode=false;
    quakeTimer=0;quakeX=0;
    clearChaosIntervals();
    document.getElementById('chaos-warn').style.display='none';
    document.getElementById('effect-label').textContent='';
    document.getElementById('wrap').classList.remove('chaos-glow');
    chaosEffect='';
    dropInterval=calcDropInterval(level);
  },duration);
}

function ghostPos(){
  let g={...piece,shape:piece.shape.map(r=>[...r])};
  while(!collides({...g,y:g.y+1}))g.y++;
  return g;
}

function update(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=lines;
  document.getElementById('score-bar').style.width=((score%10000)/10000*100)+'%';
  const linesInLevel=lines%10;
  document.getElementById('lines-bar').style.width=(linesInLevel/10*100)+'%';
  document.getElementById('lines-remain').textContent=linesInLevel===0&&lines>0?10:10-linesInLevel;
  const comboEl=document.getElementById('combo');
  comboEl.textContent='×'+combo;
  comboEl.classList.toggle('combo-hot',combo>=2);
  document.getElementById('chaos-bar').style.width=chaosGauge+'%';
}

function burstCombo(){
  const comboEl=document.getElementById('combo');
  comboEl.classList.remove('burst');
  void comboEl.offsetWidth;
  comboEl.classList.add('burst');
}

function flashBoard(color='#ffffff',opacity=0.3){

function showClearBanner(cleared){
  if(cleared<2)return;
  const label=cleared===2?'DOUBLE!':cleared===3?'TRIPLE!':'QUAD!!';
  showBigBanner(label);
}

function showBigBanner(text,color){
  const b=document.getElementById('clear-banner');
  b.textContent=text;
  b.style.color=color||'#fff';
  b.style.textShadow=color?`0 0 18px ${color},0 0 46px ${color}`:'';
  b.classList.remove('burst');
  void b.offsetWidth;
  b.classList.add('burst');

function drawCell(ctx2,x,y,color,alpha=1,sz=SZ){
  const px=x*sz+1,py=y*sz+1,w=sz-2;
  ctx2.globalAlpha=alpha;
  // main body with vertical gradient for depth
  const grad=ctx2.createLinearGradient(px,py,px,py+w);
  grad.addColorStop(0,color);
  grad.addColorStop(1,shade(color,-38));
  ctx2.fillStyle=grad;
  ctx2.fillRect(px,py,w,w);
  // top highlight
  ctx2.globalAlpha=alpha*0.45;
  ctx2.fillStyle='#ffffff';
  ctx2.fillRect(px,py,w,3);
  // left subtle highlight
  ctx2.globalAlpha=alpha*0.14;
  ctx2.fillRect(px,py,2,w);
  // bottom-right shadow edge
  ctx2.globalAlpha=alpha*0.5;
  ctx2.fillStyle='rgba(0,0,0,.55)';
  ctx2.fillRect(px,py+w-2,w,2);
  ctx2.globalAlpha=1;
}
const _shadeCache={};
function shade(hex,amt){
  const key=hex+amt;
  if(_shadeCache[key])return _shadeCache[key];
  let h=hex.replace('#','');
  if(h.length===3)h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));
  return _shadeCache[key]='rgb('+r+','+g+','+b+')';
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function drawPopups(){
  ctx.textAlign='center';
  ctx.font='bold 13px "Mochiy Pop One","M PLUS Rounded 1c","Courier New",monospace';
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.y-=0.7;p.life-=0.02;
    if(p.life<=0){popups.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle='#ffffff';
    ctx.shadowColor='#5ecbff';ctx.shadowBlur=8;
    ctx.fillText(p.text,p.x,p.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

function draw(){
  const qx=quakeTimer>0?Math.round(Math.sin(quakeTimer*0.4)*3):0;
  let sx=0,sy=0;
  if(shakeTimer>0){
    sx=(Math.random()-0.5)*shakeAmp*2;
    sy=(Math.random()-0.5)*shakeAmp*2;
    shakeTimer--;
  }
  ctx.save();
  ctx.translate(qx+sx,sy);
  if(rainbowMode){hueBase=(hueBase+3)%360;ctx.filter=`hue-rotate(${hueBase}deg) saturate(1.6)`;}
  ctx.clearRect(-10,-10,canvas.width+20,canvas.height+20);
  ctx.fillStyle='#0a0a0f';ctx.fillRect(-10,-10,canvas.width+20,canvas.height+20);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,ROWS*SZ);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(COLS*SZ,r*SZ);ctx.stroke();}

  const pieceSz=giantMode?SZ*1.35:SZ;

  if(darkMode&&!darkFlicker){
    // only show piece and 2 rows above bottom
    for(let r=ROWS-3;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]){drawCell(ctx,c,r,board[r][c]);}
    if(!locking)for(let r2=0;r2<piece.shape.length;r2++)for(let c2=0;c2<piece.shape[0].length;c2++)if(piece.shape[r2][c2])drawCell(ctx,piece.x+c2,piece.y+r2,piece.color,1,pieceSz);
  } else {
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c])drawCell(ctx,c,r,board[r][c]);
    if(!locking){
      // ghost
      const g=ghostPos();
      for(let r2=0;r2<g.shape.length;r2++)for(let c2=0;c2<g.shape[0].length;c2++)if(g.shape[r2][c2])drawCell(ctx,g.x+c2,g.y+r2,piece.color,0.2,pieceSz);
      for(let r2=0;r2<piece.shape.length;r2++)for(let c2=0;c2<piece.shape[0].length;c2++)if(piece.shape[r2][c2])drawCell(ctx,piece.x+c2,piece.y+r2,piece.color,1,pieceSz);
    }
  }

  // clearing rows: pulse to white
  if(clearingRows.length){
    const t=(Date.now()%200)/200;
    ctx.globalAlpha=0.55+Math.sin(t*Math.PI)*0.45;
    ctx.fillStyle='#ffffff';
    clearingRows.forEach(r=>ctx.fillRect(0,r*SZ,COLS*SZ,SZ));
    ctx.globalAlpha=1;
  }

  drawParticles();
  drawPopups();

  if(quakeTimer>0)quakeTimer--;
  ctx.filter='none';
  ctx.restore();

  // next (centered per slot)
  nctx.clearRect(0,0,80,200);
  nextQueue.slice(0,4).forEach((p,i)=>{
    const pw=p.shape[0].length*14,ph=p.shape.length*14;
    const ox=(80-pw)/2,oy=i*50+(44-ph)/2;
    p.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){nctx.fillStyle=p.color;nctx.fillRect(ox+c*14,oy+r*14,12,12);}}));
  });

  // hold (centered)
  hctx.clearRect(0,0,80,60);
  if(hold){
    const pw=hold.shape[0].length*14,ph=hold.shape.length*14;
    const ox=(80-pw)/2,oy=(60-ph)/2;
    hold.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){hctx.fillStyle=holdUsed?'#555':hold.color;hctx.fillRect(ox+c*14,oy+r*14,12,12);}}));
  }
}

function doHold(){
  if(holdUsed||locking||!gameRunning)return;
  SFX.hold();
  if(!hold){hold={...piece,x:0,y:0};piece=getNextPiece();}
  else{const tmp={...hold};hold={...piece,x:0,y:0};piece={...tmp,x:Math.floor((COLS-tmp.shape[0].length)/2),y:0};}
  holdUsed=true;
  if(collides()){endGame();}
}

function endGame(){
  gameRunning=false;gameOver=true;clearTimeout(dropTimer);clearTimeout(chaosTimer);clearChaosIntervals();stopAllRepeats();
  SFX.gameover();
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>GAME OVER</h2><p>スコア: ${score.toLocaleString()}<br>レベル: ${level} / ${lines}ライン</p><button class="start-btn" onclick="startGame()">もう一度</button>`;
  ov.style.display='flex';
}

function loop(ts){
  if(!gameRunning&&!gameOver)return;
  if(gameRunning){
    if(lastFrameTs==null)lastFrameTs=ts;
    const dt=Math.max(0,Math.min(200,ts-lastFrameTs)); // clamp to avoid huge jumps (tab backgrounded etc.)
    lastFrameTs=ts;
    if(!chaosActive&&!locking){
      chaosElapsed+=dt;
      const interval=calcChaosIntervalMs(level);
      chaosGauge=Math.min(100,(chaosElapsed/interval)*100);
      if(chaosElapsed>=interval){
        chaosElapsed=0;
        triggerChaos();
      }
    }
    updateChaosClockUI();
  } else {
    lastFrameTs=null;
  }
  draw();
  if(gameRunning)animId=requestAnimationFrame(loop);
}

function updateChaosClockUI(){
  document.getElementById('chaos-bar').style.width=chaosGauge+'%';
}

// ---- Input repeat system (DAS-style hold-to-repeat), shared by keyboard and on-screen buttons ----
const DAS_DELAY=150,DAS_RATE=45;
const heldActions={};
function startRepeatAction(id,fn,delay=DAS_DELAY,rate=DAS_RATE){
  stopRepeatAction(id);
  fn();
  heldActions[id]={t1:setTimeout(()=>{
    heldActions[id].t2=setInterval(fn,rate);
  },delay)};
}
function stopRepeatAction(id){
  const h=heldActions[id];
  if(h){clearTimeout(h.t1);clearInterval(h.t2);delete heldActions[id];}
}
function stopAllRepeats(){Object.keys(heldActions).forEach(stopRepeatAction);}

function doMoveLR(key){
  if(!gameRunning||locking)return;
  const base=key==='ArrowLeft'?-1:1;
  const dx=invertMode?-base:base;
  if(move(dx,0)){SFX.move();schedDrop();}
}
function doSoftDropTick(){
  if(!gameRunning||locking)return;
  SFX.softdrop();softDrop();
}
function startRepeat(key){startRepeatAction(key,()=>doMoveLR(key));}
function stopRepeat(key){stopRepeatAction(key);}

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  ensureAudio();
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    if(e.repeat)return; // we handle repeat ourselves
    startRepeat(e.key);
  }
  else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(e.repeat)return;
    startRepeatAction('softdrop',doSoftDropTick,80,60);
  }
  else if(e.key==='ArrowUp'){e.preventDefault();if(!locking){rotate(invertMode?-1:1);SFX.rotate();}}
  else if(e.key==='z'||e.key==='Z'){e.preventDefault();if(!locking){rotate(-1);SFX.rotate();}}
  else if(e.key===' '){e.preventDefault();hardDrop();}
  else if(e.key==='Shift'){e.preventDefault();doHold();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight')stopRepeat(e.key);
  else if(e.key==='ArrowDown')stopRepeatAction('softdrop');
});
window.addEventListener('blur',stopAllRepeats);

// Touch controls: drag left/right = move, tap = rotate, swipe down = hard drop, drag down = soft drop
let touchX=null,touchY=null,touchStartX=null,touchStartY=null,touchMoved=false,touchStartT=0;
canvas.addEventListener('touchstart',e=>{
  ensureAudio();
  touchX=touchStartX=e.touches[0].clientX;
  touchY=touchStartY=e.touches[0].clientY;
  touchMoved=false;touchStartT=Date.now();
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(touchX===null)return;e.preventDefault();
  const nx=e.touches[0].clientX,ny=e.touches[0].clientY;
  const dx=nx-touchX,dy=ny-touchY;
  if(Math.abs(dx)>18){if(move(dx>0?1:-1,0))SFX.move();touchX=nx;touchMoved=true;}
  if(dy>24){if(!locking){softDrop();}touchY=ny;touchMoved=true;}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(touchStartY!==null){
    const totalDy=e.changedTouches[0].clientY-touchStartY;
    const dt=Date.now()-touchStartT;
    if(totalDy>70&&dt<300){hardDrop();}
    else if(!touchMoved&&dt<250){if(!locking&&gameRunning){rotate(invertMode?-1:1);SFX.rotate();}}
  }
  touchX=touchY=touchStartX=touchStartY=null;
});

// ---- Font load diagnostic: shows directly on screen whether the web font actually loaded,
// so this can be checked at a glance (e.g. via screenshot) without opening dev tools ----
(function(){
  const statusEl=document.getElementById('font-status');
  if(!statusEl||!window.FontFace||!document.fonts){statusEl&&(statusEl.textContent=' | Font check: unsupported');return;}
  Promise.all([
    document.fonts.load("16px 'Mochiy Pop One'").catch(()=>[]),
    document.fonts.load("700 16px 'M PLUS Rounded 1c'").catch(()=>[])
  ]).then(()=>document.fonts.ready).then(()=>{
    const mochiOk=document.fonts.check("16px 'Mochiy Pop One'");
    const mplusOk=document.fonts.check("700 16px 'M PLUS Rounded 1c'");
    statusEl.textContent=' | Font: '+(mochiOk?'Mochiy OK':(mplusOk?'Mochiy NG / M+PLUS OK':'both NG (fallback)'));
  }).catch(()=>{statusEl.textContent=' | Font check: error';});
})();
