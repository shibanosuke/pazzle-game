<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#app{
  --bg:#04040a;--panel:#111119;--panel-border:rgba(255,255,255,.08);
  --accent:#5ecbff;--accent2:#ff3d6e;--warn:#ffcc00;--ok:#00e676;
  --text:#f2f4fa;--muted:#7c8199;
  --f-display:'Orbitron','Trebuchet MS',var(--font-sans),sans-serif;
  --f-pixel:'Press Start 2P','Courier New',monospace;
  font-family:var(--f-display);color:var(--text);
  position:fixed;inset:0;width:100%;height:100vh;height:100dvh;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:clamp(4px,2vw,20px);overflow:auto;touch-action:none;
}
#game-shell{display:flex;flex-direction:column;align-items:center;gap:8px;max-width:900px;width:100%;max-height:100%}
#game-row{display:flex;gap:clamp(8px,2vw,24px);justify-content:center;align-items:flex-start;width:100%;flex-wrap:wrap}
.side{width:clamp(100px,18vw,150px);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
canvas{display:block;border:0.5px solid rgba(255,255,255,.08);border-radius:4px;background:#0a0a0f}
.panel{position:relative;overflow:hidden;background:var(--panel);border:0.5px solid var(--panel-border);border-radius:12px;padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 2px 10px rgba(0,0,0,.5)}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.55}
.panel-title{font-family:var(--f-display);font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.09em;font-weight:700}
.big-num{font-family:var(--f-pixel);font-size:16px;line-height:1.5;font-weight:400;color:var(--text);text-shadow:0 0 10px rgba(255,255,255,.18);transition:transform .15s ease}
.big-num.pop{transform:scale(1.22)}
.small-label{font-family:var(--f-display);font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.03em}
.gauge{height:6px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-top:8px}
.gauge-fill{height:100%;border-radius:4px;width:0%;transition:width .25s ease}
#score-bar{background:linear-gradient(90deg,var(--accent),#8ee8ff)}
#lines-bar{background:linear-gradient(90deg,var(--ok),#8effc7)}
#next-canvas{display:block;margin:0 auto}
#hold-canvas{display:block;margin:0 auto}
.danger-badge{background:rgba(255,61,110,.15);color:var(--accent2);font-size:11px;padding:3px 8px;border-radius:6px;display:none}
#effect-label{font-family:var(--f-display);font-size:11px;color:var(--warn);min-height:14px;margin-top:4px;font-weight:700;letter-spacing:.02em}
button.start-btn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#04040a;font-family:var(--f-display);font-size:14px;font-weight:800;letter-spacing:.05em;cursor:pointer;box-shadow:0 0 16px rgba(94,203,255,.35)}
button.start-btn:hover{opacity:.9}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,rgba(40,50,80,.4),rgba(0,0,0,.9));border-radius:4px;color:#fff;gap:14px}
#overlay h2{font-family:var(--f-pixel);font-size:18px;font-weight:400;letter-spacing:.04em;line-height:1.6;text-shadow:0 0 16px var(--accent),0 0 36px var(--accent);animation:title-flicker 2.6s infinite}
@keyframes title-flicker{0%,90%,100%{opacity:1}92%{opacity:.65}94%{opacity:1}97%{opacity:.7}}
#overlay p{font-family:var(--f-display);font-size:12px;opacity:.75;text-align:center;max-width:190px;line-height:1.7;letter-spacing:.01em}
#wrap{position:relative;width:clamp(160px,44vw,240px);max-width:100%}
canvas#board{width:100%;height:auto;aspect-ratio:1/2;border:2px solid #fff;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 0 34px rgba(94,203,255,.18);transition:box-shadow .35s ease}
#wrap.chaos-glow canvas#board{box-shadow:0 0 0 1px rgba(255,61,110,.4),0 0 26px rgba(255,61,110,.6),0 0 60px rgba(255,61,110,.3)}
#flash-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:4px}
#levelup-banner{font-family:var(--f-pixel);position:absolute;top:12px;left:50%;transform:translateX(-50%) scale(.75);color:#fff;font-size:10px;letter-spacing:.03em;text-shadow:0 0 14px var(--accent),0 0 28px var(--accent);opacity:0;pointer-events:none;transition:all .25s ease;white-space:nowrap}
#levelup-banner.show{opacity:1;transform:translateX(-50%) scale(1)}
#clear-banner{font-family:var(--f-pixel);position:absolute;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);opacity:0;color:#fff;font-size:15px;letter-spacing:.02em;text-shadow:0 0 18px var(--accent2),0 0 42px var(--accent2);pointer-events:none;white-space:nowrap}
#clear-banner.burst{animation:clear-burst .7s cubic-bezier(.19,1.6,.4,1) forwards}
@keyframes clear-burst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(2.7)}
  22%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  45%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.85)}
}
#keys{font-family:var(--f-display);font-size:11px;color:var(--muted);line-height:1.6;letter-spacing:.01em;text-align:center;max-width:520px}
#controls{display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,28px);width:100%;flex-wrap:wrap;padding:6px 0}
.ctrl-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.ctrl-group{display:flex;gap:8px}
.ctrl-btn{
  min-width:50px;min-height:46px;padding:0 10px;border-radius:10px;
  background:var(--panel);border:1px solid var(--panel-border);color:var(--text);
  font-family:var(--f-display);font-size:17px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;
  box-shadow:0 2px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
}
.ctrl-btn:active{background:var(--accent);color:#04040a;transform:scale(.93)}
.ctrl-btn.wide{min-width:88px;font-size:12px;letter-spacing:.06em}
.ctrl-btn.harddrop{background:linear-gradient(135deg,var(--accent2),#ff7a9c);color:#1a0007;border-color:transparent}
.ctrl-btn.harddrop:active{filter:brightness(1.2)}
.icon-btn svg{display:block;pointer-events:none}
.icon-btn.mirror-x svg{transform:scaleX(-1)}
#chaos-warn{font-family:var(--f-display);background:rgba(255,204,0,.12);border:0.5px solid rgba(255,204,0,.35);color:var(--warn);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.03em;display:none;animation:chaos-pulse 0.6s ease-in-out infinite}
@keyframes chaos-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.03)}}
#combo{display:inline-block}
#combo.combo-hot{color:var(--accent2);text-shadow:0 0 14px currentColor}
#combo.burst{animation:combo-burst .45s cubic-bezier(.2,1.5,.4,1)}
@keyframes combo-burst{0%{transform:scale(2.1);text-shadow:0 0 26px currentColor}60%{transform:scale(1.05)}100%{transform:scale(1)}}

@media (max-width:680px),(max-aspect-ratio:4/5){
  #game-row{flex-direction:column;align-items:center;gap:6px}
  #wrap{order:-1;width:min(74vw,280px);margin-bottom:2px}
  .side{width:100%;max-width:340px;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px}
  .side .panel{flex:1 1 84px;min-width:78px;padding:7px 8px}
  .side .panel-title{font-size:9px;margin-bottom:4px}
  .side .big-num{font-size:12px}
  .side .small-label{font-size:9px;margin-top:3px}
  #keys{display:none}
  #controls{gap:14px;padding:2px 0}
  .ctrl-btn{min-width:44px;min-height:44px;font-size:15px}
  .ctrl-btn.wide{min-width:70px;font-size:11px}
}
@media (max-height:700px) and (max-width:680px){
  #game-shell{gap:6px}
  .side .panel{padding:5px 7px}
  .ctrl-btn{min-height:40px}
}

</style>

<div id="app">
  <div id="game-shell">
    <div id="game-row">
      <div id="side-left" class="side">
        <div class="panel">
          <div class="panel-title">ホールド <span style="font-size:10px;opacity:.6">[Shift]</span></div>
          <canvas id="hold-canvas" width="80" height="60"></canvas>
        </div>
        <div class="panel">
          <div class="panel-title">スコア</div>
          <div class="big-num" id="score">0</div>
          <div class="gauge"><div class="gauge-fill" id="score-bar"></div></div>

        </div>

      <div id="wrap">
        <canvas id="board" width="220" height="440"></canvas>

        </div>

          <div class="panel-title">カオスゲージ</div>

    <div id="controls">

        <div class="ctrl-group">
          <button class="ctrl-btn icon-btn" id="btn-rotate-ccw" title="反時計回り">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v5h5"/></svg>
          </button>
          <button class="ctrl-btn icon-btn mirror-x" id="btn-rotate-cw" title="回転">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      </div>
      <div class="ctrl-col">
        <div class="ctrl-group">
          <button class="ctrl-btn icon-btn" id="btn-left" title="左">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 4 L15 20 L5 12 Z" fill="currentColor"/></svg>
          </button>
          <button class="ctrl-btn icon-btn" id="btn-down" title="ソフトドロップ">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 8 L20 8 L12 18 Z" fill="currentColor"/></svg>
          </button>

    <div id="keys">
      ← → 移動&nbsp; ↑ 回転&nbsp; ↓ ソフトドロップ&nbsp; Space ハードドロップ&nbsp; Shift ホールド&nbsp; Z 反時計回り
    </div>
  </div>
</div>

<script>
const COLS=11,ROWS=22,SZ=20;
const SHAPES=[
  [[1,1,1,1]],                      // I
  [[1,1],[1,1]],                    // O
  [[0,1,0],[1,1,1]],                // T
  [[1,0,0],[1,1,1]],                // J
  [[0,0,1],[1,1,1]],                // L
  [[0,1,1],[1,1,0]],                // S
  [[1,1,0],[0,1,1]],                // Z
  [[1,1,1],[1,0,1],[1,0,1]],        // U (special)
  [[1],[1]],                        // V2: simple vertical 2-cell mino
];
// each mino type always renders in its own fixed color
const COLORS=['#4ec9ff','#ffcc00','#b388ff','#3d5afe','#ff6b35','#00e676','#ff4444','#69ffda','#ff3ea5'];
const CHAOS_EFFECTS=['反転','暗転','幽霊','地震','倍速','縮小','色変','ガーベジ','虹色','テレポート','乱回転','巨大化','スロー','一列消去','ミラー'];
let board,piece,nextQueue,hold,holdUsed,score,lines,level,combo,chaosGauge,chaosActive,chaosTimer,chaosEffect,gameRunning,gameOver,animId,dropTimer,dropInterval,darkMode,invertMode,ghostMode,quakeX,quakeTimer,miniMode;
let chaosCount,garbageMode,rainbowMode,teleportMode,randRotateMode,giantMode,mirrorMode,darkFlicker,chaosIntervals,hueBase;
let particles=[],popups=[],shakeTimer=0,shakeAmp=0,clearingRows=[],locking=false;

// ---- Sound (WebAudio, generated beeps - no external files) ----
let audioCtx=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function beep(freq,dur=0.08,type='square',vol=0.05,slideTo=null,delay=0){
  if(!audioCtx)return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+dur+0.02);
}
const SFX={
  move:()=>beep(220,0.03,'square',0.02),
  rotate:()=>beep(330,0.05,'square',0.03),
  softdrop:()=>beep(180,0.03,'square',0.02),
  harddrop:()=>{beep(140,0.1,'square',0.06,60);},
  lock:()=>beep(200,0.05,'triangle',0.04),
  hold:()=>beep(440,0.06,'sine',0.04),
  clear1:()=>{beep(523,0.09,'square',0.05);beep(659,0.09,'square',0.05,null,0.07);},
  clear2:()=>{beep(523,0.08,'square',0.05);beep(659,0.08,'square',0.05,null,0.06);beep(784,0.12,'square',0.05,null,0.12);},
  quad:()=>{[523,659,784,1047].forEach((f,i)=>beep(f,0.12,'square',0.06,null,i*0.07));},
  levelup:()=>{[440,554,659,880].forEach((f,i)=>beep(f,0.1,'triangle',0.05,null,i*0.06));},
  chaos:()=>{beep(880,0.3,'sawtooth',0.05,220);beep(880,0.3,'sawtooth',0.04,220,0.15);},
  gameover:()=>{[392,330,262,196].forEach((f,i)=>beep(f,0.22,'triangle',0.06,null,i*0.16));},
};

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const nctx=document.getElementById('next-canvas').getContext('2d');
const hctx=document.getElementById('hold-canvas').getContext('2d');

function newBoard(){return Array.from({length:ROWS},()=>new Array(COLS).fill(0))}
function randPiece(){
  const si=Math.floor(Math.random()*SHAPES.length);
  const s=SHAPES[si];
  return{shape:s.map(r=>[...r]),color:COLORS[si],x:Math.floor((COLS-s[0].length)/2),y:0};
}
function fillQueue(){while(nextQueue.length<5)nextQueue.push(randPiece())}
function mirrorShape(shape){return shape.map(row=>[...row].reverse());}
function getNextPiece(){
  let p=nextQueue.shift();fillQueue();
  if(mirrorMode)p.shape=mirrorShape(p.shape);
  return p;
}

function calcDropInterval(lvl){
  // exponential ramp: gets noticeably faster level over level, floor at 60ms
  return Math.max(60,Math.round(800*Math.pow(0.87,lvl-1)));
}

function clearChaosIntervals(){
  (chaosIntervals||[]).forEach(id=>clearInterval(id));
  chaosIntervals=[];
}

function startGame(){
  board=newBoard();nextQueue=[];hold=null;holdUsed=false;
  score=0;lines=0;level=1;combo=0;chaosGauge=0;chaosActive=false;chaosEffect='';chaosCount=0;
  gameRunning=true;gameOver=false;darkMode=false;invertMode=false;ghostMode=false;quakeX=0;quakeTimer=0;miniMode=false;
  garbageMode=false;rainbowMode=false;teleportMode=false;randRotateMode=false;giantMode=false;mirrorMode=false;darkFlicker=false;hueBase=0;
  particles=[];popups=[];shakeTimer=0;shakeAmp=0;clearingRows=[];locking=false;
  ensureAudio();
  clearChaosIntervals();
  dropInterval=calcDropInterval(level);
  fillQueue();piece=getNextPiece();
  document.getElementById('overlay').style.display='none';
  document.getElementById('chaos-warn').style.display='none';
  document.getElementById('wrap').classList.remove('chaos-glow');
  if(animId)cancelAnimationFrame(animId);
  clearTimeout(dropTimer);
  schedDrop();
  loop();
}

function schedDrop(){
  clearTimeout(dropTimer);
  dropTimer=setTimeout(()=>{if(gameRunning)softDrop(true);},dropInterval);
}

function softDrop(auto=false){
  if(!gameRunning||locking)return;
  if(!move(0,1)){lock();return;}
  if(!auto)score+=1;
  schedDrop();
}

function hardDrop(){
  if(!gameRunning||locking)return;
  let d=0;while(move(0,1))d++;
  score+=d*2;
  SFX.harddrop();
  lock();
}

function move(dx,dy){
  piece.x+=dx;piece.y+=dy;
  if(collides()){piece.x-=dx;piece.y-=dy;return false;}
  return true;
}

function rotate(dir=1){
  const orig=piece.shape.map(r=>[...r]);
  const R=piece.shape.length,C=piece.shape[0].length;
  let rotated=Array.from({length:C},(_,i)=>Array.from({length:R},(_,j)=>dir===1?piece.shape[R-1-j][i]:piece.shape[j][C-1-i]));
  piece.shape=rotated;
  // wall kick
  for(let kick of[0,-1,1,-2,2]){piece.x+=kick;if(!collides())return;piece.x-=kick;}
  piece.shape=orig;
}

function collides(p=piece,b=board){
  for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[0].length;c++){
    if(!p.shape[r][c])continue;
    const nx=p.x+c,ny=p.y+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return true;
    if(ny>=0&&b[ny][nx])return true;
  }
  return false;
}

function lock(){
  if(locking)return;
  SFX.lock();
  for(let r=0;r<piece.shape.length;r++)for(let c=0;c<piece.shape[0].length;c++){
    if(piece.shape[r][c]){
      const ny=piece.y+r;
      if(ny<0){endGame();return;}
      board[ny][piece.x+c]=piece.color;
    }
  }
  // find full rows
  const full=[];
  for(let r=0;r<ROWS;r++)if(board[r].every(c=>c))full.push(r);
  if(full.length){
    // flash animation: freeze briefly, show rows in white, then remove
    locking=true;
    clearingRows=full;
    clearTimeout(dropTimer);
    spawnClearParticles(full);
    setTimeout(()=>{
      if(!gameRunning){clearingRows=[];locking=false;return;}
      // remove marked rows (descending so indices stay valid)
      full.sort((a,b)=>b-a).forEach(r=>{board.splice(r,1);board.unshift(new Array(COLS).fill(0));});
      clearingRows=[];
      locking=false;
      applyClearScore(full.length);
      nextPieceIn();
    },200);
  } else {
    combo=0;update();
    nextPieceIn();
  }
}

function nextPieceIn(){
  holdUsed=false;
  piece=getNextPiece();
  if(collides()){endGame();return;}
  schedDrop();
}

function applyClearScore(cleared){
  combo++;
  const prevLevel=level;
  const pts=Math.round([0,100,300,500,800][Math.min(cleared,4)]*level*(1+combo*0.1));
  score+=pts;
  lines+=cleared;
  level=Math.floor(lines/10)+1;
  if(!chaosActive)dropInterval=calcDropInterval(level);
  // gauge fills faster the higher the level, so chaos comes more often as the game escalates
  chaosGauge=Math.min(100,chaosGauge+cleared*18+Math.floor(level*1.2));
  if(chaosGauge>=100&&!chaosActive)triggerChaos();
  if(level>prevLevel){showLevelUp();SFX.levelup();}
  if(cleared>=4)SFX.quad();else if(cleared>=2)SFX.clear2();else SFX.clear1();
  spawnPopup('+'+pts.toLocaleString());
  shake(cleared>=4?6:cleared>=2?4:2,cleared>=4?18:10);
  flashScore();
  flashBoard();
  burstCombo();
  showClearBanner(cleared);
  update();
}

function spawnClearParticles(rows){
  rows.forEach(r=>{
    for(let c=0;c<COLS;c++){
      const color=board[r][c]||'#ffffff';
      for(let k=0;k<2;k++){
        particles.push({
          x:c*SZ+SZ/2,y:r*SZ+SZ/2,
          vx:(Math.random()-0.5)*4.5,vy:-Math.random()*3.5-1,
          size:Math.random()*4+2,color,life:1,decay:0.025+Math.random()*0.02
        });
      }
    }
  });
  if(particles.length>400)particles.splice(0,particles.length-400);
}

function spawnPopup(text){
  popups.push({text,x:COLS*SZ/2,y:ROWS*SZ*0.35,life:1});
}

function shake(amp,frames){shakeAmp=amp;shakeTimer=frames;}

function showLevelUp(){
  const b=document.getElementById('levelup-banner');
  b.textContent='LEVEL '+level+' !';
  b.classList.add('show');
  clearTimeout(b._t);
  b._t=setTimeout(()=>b.classList.remove('show'),1100);
}

function flashScore(){
  const s=document.getElementById('score');
  s.classList.add('pop');
  clearTimeout(s._t);
  s._t=setTimeout(()=>s.classList.remove('pop'),180);
}

function applyChaosEffect(eff){
  if(eff==='暗転'){
    darkMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!darkMode)return;
      darkFlicker=true;
      setTimeout(()=>{darkFlicker=false;},220);
    },1500);
    chaosIntervals.push(id);
  }
  else if(eff==='反転')invertMode=true;
  else if(eff==='幽霊')ghostMode=true;
  else if(eff==='縮小')miniMode=true;
  else if(eff==='巨大化')giantMode=true;
  else if(eff==='地震')quakeTimer=999999; // cleared on chaos end
  else if(eff==='倍速')dropInterval=Math.max(40,dropInterval/2);
  else if(eff==='スロー')dropInterval=Math.round(dropInterval*1.8);
  else if(eff==='色変'){board.forEach(row=>row.forEach((_,i,a)=>{if(a[i])a[i]=COLORS[Math.floor(Math.random()*COLORS.length)]}));}
  else if(eff==='一列消去'){
    const filledRows=[];
    for(let r=0;r<ROWS;r++){if(board[r].some(c=>c))filledRows.push(r);}
    if(filledRows.length){
      const r=filledRows[Math.floor(Math.random()*filledRows.length)];
      board.splice(r,1);board.unshift(new Array(COLS).fill(0));
    }
  }
  else if(eff==='ミラー'){
    mirrorMode=true;
    piece.shape=mirrorShape(piece.shape);
  }
  else if(eff==='虹色')rainbowMode=true;
  else if(eff==='テレポート'){
    teleportMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!teleportMode)return;
      const maxX=COLS-piece.shape[0].length;
      const nx=Math.max(0,Math.floor(Math.random()*(maxX+1)));
      const orig=piece.x;piece.x=nx;
      if(collides())piece.x=orig;
    },1400);
    chaosIntervals.push(id);
  }
  else if(eff==='乱回転'){
    randRotateMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!randRotateMode)return;
      rotate(Math.random()<0.5?1:-1);
    },1600);
    chaosIntervals.push(id);
  }
  else if(eff==='ガーベジ'){
    garbageMode=true;
    const id=setInterval(()=>{
      if(!gameRunning||!garbageMode)return;
      board.shift();
      const hole=Math.floor(Math.random()*COLS);
      const row=new Array(COLS).fill('#555');row[hole]=0;
      board.push(row);
      if(collides())endGame();
    },2200);
    chaosIntervals.push(id);
  }
}

function triggerChaos(){
  chaosActive=true;chaosGauge=0;chaosCount++;
  clearChaosIntervals();
  darkMode=invertMode=ghostMode=miniMode=giantMode=mirrorMode=darkFlicker=false;
  garbageMode=rainbowMode=teleportMode=randRotateMode=false;
  quakeTimer=0;
  document.getElementById('wrap').classList.add('chaos-glow');
  SFX.chaos();

  const effects=[CHAOS_EFFECTS[Math.floor(Math.random()*CHAOS_EFFECTS.length)]];
  // the more chaos has already struck, the higher the chance of a second effect stacking
  const stackChance=Math.min(0.75,0.1+chaosCount*0.08+level*0.02);
  if(Math.random()<stackChance){
    let second;
    do{second=CHAOS_EFFECTS[Math.floor(Math.random()*CHAOS_EFFECTS.length)];}while(second===effects[0]);
    effects.push(second);
  }

  chaosEffect=effects.join(' + ');
  document.getElementById('chaos-warn').style.display='block';
  document.getElementById('effect-label').textContent='▸ '+chaosEffect;
  effects.forEach(applyChaosEffect);

  // chaos episodes get a little longer as they escalate
  const duration=6000+Math.min(3000,chaosCount*250);
  chaosTimer=setTimeout(()=>{
    chaosActive=false;darkMode=false;invertMode=false;ghostMode=false;miniMode=false;giantMode=false;mirrorMode=false;darkFlicker=false;
    garbageMode=false;rainbowMode=false;teleportMode=false;randRotateMode=false;
    quakeTimer=0;quakeX=0;
    clearChaosIntervals();
    document.getElementById('chaos-warn').style.display='none';
    document.getElementById('effect-label').textContent='';
    document.getElementById('wrap').classList.remove('chaos-glow');
    chaosEffect='';
    dropInterval=calcDropInterval(level);
  },duration);
}

function ghostPos(){
  let g={...piece,shape:piece.shape.map(r=>[...r])};
  while(!collides({...g,y:g.y+1}))g.y++;
  return g;
}

function update(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=lines;
  document.getElementById('score-bar').style.width=((score%10000)/10000*100)+'%';
  const linesInLevel=lines%10;
  document.getElementById('lines-bar').style.width=(linesInLevel/10*100)+'%';
  document.getElementById('lines-remain').textContent=linesInLevel===0&&lines>0?10:10-linesInLevel;
  const comboEl=document.getElementById('combo');
  comboEl.textContent='×'+combo;
  comboEl.classList.toggle('combo-hot',combo>=2);
  document.getElementById('chaos-bar').style.width=chaosGauge+'%';
}

function burstCombo(){
  const comboEl=document.getElementById('combo');
  comboEl.classList.remove('burst');
  void comboEl.offsetWidth;
  comboEl.classList.add('burst');
}

function flashBoard(){
  const f=document.getElementById('flash-overlay');
  f.style.transition='none';f.style.opacity='.3';
  requestAnimationFrame(()=>{f.style.transition='opacity .3s ease';f.style.opacity='0';});
}

function showClearBanner(cleared){
  if(cleared<2)return;
  const label=cleared===2?'DOUBLE!':cleared===3?'TRIPLE!':'QUAD!!';
  const b=document.getElementById('clear-banner');
  b.textContent=label;
  b.classList.remove('burst');
  void b.offsetWidth;
  b.classList.add('burst');
}

function drawCell(ctx2,x,y,color,alpha=1,sz=SZ){
  const px=x*sz+1,py=y*sz+1,w=sz-2;
  ctx2.globalAlpha=alpha;
  // main body with vertical gradient for depth
  const grad=ctx2.createLinearGradient(px,py,px,py+w);
  grad.addColorStop(0,color);
  grad.addColorStop(1,shade(color,-38));
  ctx2.fillStyle=grad;
  ctx2.fillRect(px,py,w,w);
  // top highlight
  ctx2.globalAlpha=alpha*0.45;
  ctx2.fillStyle='#ffffff';
  ctx2.fillRect(px,py,w,3);
  // left subtle highlight
  ctx2.globalAlpha=alpha*0.14;
  ctx2.fillRect(px,py,2,w);
  // bottom-right shadow edge
  ctx2.globalAlpha=alpha*0.5;
  ctx2.fillStyle='rgba(0,0,0,.55)';
  ctx2.fillRect(px,py+w-2,w,2);
  ctx2.globalAlpha=1;
}
const _shadeCache={};
function shade(hex,amt){
  const key=hex+amt;
  if(_shadeCache[key])return _shadeCache[key];
  let h=hex.replace('#','');
  if(h.length===3)h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));
  return _shadeCache[key]='rgb('+r+','+g+','+b+')';
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function drawPopups(){
  ctx.textAlign='center';
  ctx.font='12px "Press Start 2P","Courier New",monospace';
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.y-=0.7;p.life-=0.02;
    if(p.life<=0){popups.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle='#ffffff';
    ctx.shadowColor='#5ecbff';ctx.shadowBlur=8;
    ctx.fillText(p.text,p.x,p.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

function draw(){
  const qx=quakeTimer>0?Math.round(Math.sin(quakeTimer*0.4)*3):0;
  let sx=0,sy=0;
  if(shakeTimer>0){
    sx=(Math.random()-0.5)*shakeAmp*2;
    sy=(Math.random()-0.5)*shakeAmp*2;
    shakeTimer--;
  }
  ctx.save();
  ctx.translate(qx+sx,sy);
  if(rainbowMode){hueBase=(hueBase+3)%360;ctx.filter=`hue-rotate(${hueBase}deg) saturate(1.6)`;}
  ctx.clearRect(-10,-10,canvas.width+20,canvas.height+20);
  ctx.fillStyle='#0a0a0f';ctx.fillRect(-10,-10,canvas.width+20,canvas.height+20);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*SZ,0);ctx.lineTo(c*SZ,ROWS*SZ);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*SZ);ctx.lineTo(COLS*SZ,r*SZ);ctx.stroke();}

  const pieceSz=giantMode?SZ*1.35:SZ;

  if(darkMode&&!darkFlicker){
    // only show piece and 2 rows above bottom
    for(let r=ROWS-3;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]){drawCell(ctx,c,r,board[r][c]);}
    if(!locking)for(let r2=0;r2<piece.shape.length;r2++)for(let c2=0;c2<piece.shape[0].length;c2++)if(piece.shape[r2][c2])drawCell(ctx,piece.x+c2,piece.y+r2,piece.color,1,pieceSz);
  } else {
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c])drawCell(ctx,c,r,board[r][c]);
    if(!locking){
      // ghost
      if(!ghostMode){
        const g=ghostPos();
        for(let r2=0;r2<g.shape.length;r2++)for(let c2=0;c2<g.shape[0].length;c2++)if(g.shape[r2][c2])drawCell(ctx,g.x+c2,g.y+r2,piece.color,0.2,pieceSz);
      }
      for(let r2=0;r2<piece.shape.length;r2++)for(let c2=0;c2<piece.shape[0].length;c2++)if(piece.shape[r2][c2])drawCell(ctx,piece.x+c2,piece.y+r2,piece.color,1,pieceSz);
    }
  }

  // clearing rows: pulse to white
  if(clearingRows.length){
    const t=(Date.now()%200)/200;
    ctx.globalAlpha=0.55+Math.sin(t*Math.PI)*0.45;
    ctx.fillStyle='#ffffff';
    clearingRows.forEach(r=>ctx.fillRect(0,r*SZ,COLS*SZ,SZ));
    ctx.globalAlpha=1;
  }

  drawParticles();
  drawPopups();

  if(quakeTimer>0)quakeTimer--;
  ctx.filter='none';
  ctx.restore();

  // next (centered per slot)
  nctx.clearRect(0,0,80,200);
  nextQueue.slice(0,4).forEach((p,i)=>{
    const pw=p.shape[0].length*14,ph=p.shape.length*14;
    const ox=(80-pw)/2,oy=i*50+(44-ph)/2;
    p.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){nctx.fillStyle=p.color;nctx.fillRect(ox+c*14,oy+r*14,12,12);}}));
  });

  // hold (centered)
  hctx.clearRect(0,0,80,60);
  if(hold){
    const pw=hold.shape[0].length*14,ph=hold.shape.length*14;
    const ox=(80-pw)/2,oy=(60-ph)/2;
    hold.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v){hctx.fillStyle=holdUsed?'#555':hold.color;hctx.fillRect(ox+c*14,oy+r*14,12,12);}}));
  }
}

function doHold(){
  if(holdUsed||locking||!gameRunning)return;
  SFX.hold();
  if(!hold){hold={...piece,x:0,y:0};piece=getNextPiece();}
  else{const tmp={...hold};hold={...piece,x:0,y:0};piece={...tmp,x:Math.floor((COLS-tmp.shape[0].length)/2),y:0};}
  holdUsed=true;
  if(collides()){endGame();}
}

function endGame(){
  gameRunning=false;gameOver=true;clearTimeout(dropTimer);clearTimeout(chaosTimer);clearChaosIntervals();stopAllRepeats();
  SFX.gameover();
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>GAME OVER</h2><p>スコア: ${score.toLocaleString()}<br>レベル: ${level} / ${lines}ライン</p><button class="start-btn" onclick="startGame()">もう一度</button>`;
  ov.style.display='flex';
}

function loop(){
  if(!gameRunning&&!gameOver)return;
  draw();
  if(gameRunning)animId=requestAnimationFrame(loop);
}

// ---- Input repeat system (DAS-style hold-to-repeat), shared by keyboard and on-screen buttons ----
const DAS_DELAY=150,DAS_RATE=45;
const heldActions={};
function startRepeatAction(id,fn,delay=DAS_DELAY,rate=DAS_RATE){
  stopRepeatAction(id);
  fn();
  heldActions[id]={t1:setTimeout(()=>{
    heldActions[id].t2=setInterval(fn,rate);
  },delay)};
}
function stopRepeatAction(id){
  const h=heldActions[id];
  if(h){clearTimeout(h.t1);clearInterval(h.t2);delete heldActions[id];}
}
function stopAllRepeats(){Object.keys(heldActions).forEach(stopRepeatAction);}

function doMoveLR(key){
  if(!gameRunning||locking)return;
  const base=key==='ArrowLeft'?-1:1;
  const dx=invertMode?-base:base;
  if(move(dx,0)){SFX.move();schedDrop();}
}
function doSoftDropTick(){
  if(!gameRunning||locking)return;
  SFX.softdrop();softDrop();
}
function startRepeat(key){startRepeatAction(key,()=>doMoveLR(key));}
function stopRepeat(key){stopRepeatAction(key);}

document.addEventListener('keydown',e=>{
  if(!gameRunning)return;
  ensureAudio();
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    if(e.repeat)return; // we handle repeat ourselves
    startRepeat(e.key);
  }
  else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(e.repeat)return;
    startRepeatAction('softdrop',doSoftDropTick,80,60);
  }
  else if(e.key==='ArrowUp'){e.preventDefault();if(!locking){rotate(invertMode?-1:1);SFX.rotate();}}
  else if(e.key==='z'||e.key==='Z'){e.preventDefault();if(!locking){rotate(-1);SFX.rotate();}}
  else if(e.key===' '){e.preventDefault();hardDrop();}
  else if(e.key==='Shift'){e.preventDefault();doHold();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight')stopRepeat(e.key);
  else if(e.key==='ArrowDown')stopRepeatAction('softdrop');
});
window.addEventListener('blur',stopAllRepeats);

// ---- On-screen control pad (works with mouse clicks and touch taps alike via Pointer Events) ----
function bindHoldButton(id,start,stop){
  const el=document.getElementById(id);
  if(!el)return;
  const onDown=e=>{e.preventDefault();ensureAudio();start();};
  const onUp=e=>{e.preventDefault();stop();};
  el.addEventListener('pointerdown',onDown);
  el.addEventListener('pointerup',onUp);
  el.addEventListener('pointerleave',onUp);
  el.addEventListener('pointercancel',onUp);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
function bindTapButton(id,fn){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('pointerdown',e=>{e.preventDefault();ensureAudio();fn();});
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
bindHoldButton('btn-left',()=>startRepeat('ArrowLeft'),()=>stopRepeat('ArrowLeft'));
bindHoldButton('btn-right',()=>startRepeat('ArrowRight'),()=>stopRepeat('ArrowRight'));
bindHoldButton('btn-down',()=>startRepeatAction('softdrop',doSoftDropTick,80,60),()=>stopRepeatAction('softdrop'));
bindTapButton('btn-rotate-cw',()=>{if(gameRunning&&!locking){rotate(invertMode?-1:1);SFX.rotate();}});
bindTapButton('btn-rotate-ccw',()=>{if(gameRunning&&!locking){rotate(-1);SFX.rotate();}});
bindTapButton('btn-harddrop',()=>{if(gameRunning)hardDrop();});
bindTapButton('btn-hold',()=>{if(gameRunning)doHold();});

// Touch controls: drag left/right = move, tap = rotate, swipe down = hard drop, drag down = soft drop
let touchX=null,touchY=null,touchStartX=null,touchStartY=null,touchMoved=false,touchStartT=0;
canvas.addEventListener('touchstart',e=>{
  ensureAudio();
  touchX=touchStartX=e.touches[0].clientX;
  touchY=touchStartY=e.touches[0].clientY;
  touchMoved=false;touchStartT=Date.now();
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(touchX===null)return;e.preventDefault();
  const nx=e.touches[0].clientX,ny=e.touches[0].clientY;
  const dx=nx-touchX,dy=ny-touchY;
  if(Math.abs(dx)>18){if(move(dx>0?1:-1,0))SFX.move();touchX=nx;touchMoved=true;}
  if(dy>24){if(!locking){softDrop();}touchY=ny;touchMoved=true;}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(touchStartY!==null){
    const totalDy=e.changedTouches[0].clientY-touchStartY;
    const dt=Date.now()-touchStartT;
    if(totalDy>70&&dt<300){hardDrop();}
    else if(!touchMoved&&dt<250){if(!locking&&gameRunning){rotate(invertMode?-1:1);SFX.rotate();}}
  }
  touchX=touchY=touchStartX=touchStartY=null;
});
</script>
